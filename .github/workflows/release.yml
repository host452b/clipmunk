name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: package chrome extension
        run: |
          zip Clipmunk-Chrome.zip \
            manifest.json \
            popup/popup.html \
            popup/popup.css \
            popup/popup.js \
            background/service-worker.js \
            icons/icon16.png \
            icons/icon32.png \
            icons/icon48.png \
            icons/icon128.png

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: Clipmunk-Chrome.zip
